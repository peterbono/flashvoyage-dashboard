<!DOCTYPE html>
<html>
<head><title>Seed Actions</title></head>
<body style="background:#0a0a0b;color:#fafafa;font-family:sans-serif;padding:40px;">
<h1>Seeding action history…</h1>
<p id="status">Fetching seed data…</p>
<script>
fetch('/seed-actions.json?v=' + Date.now())
  .then(function(r){return r.json()})
  .then(function(d){
    localStorage.setItem('fv-actions-done-v1', JSON.stringify(d));
    document.getElementById('status').innerHTML = '✅ Seeded ' + d.entries.length + ' entries.<br><br><a href="/content" style="color:#60a5fa;">← Back to dashboard</a>';
  })
  .catch(function(e){
    document.getElementById('status').innerHTML = '❌ Error: ' + e.message;
  });
</script>
</body>
</html>
